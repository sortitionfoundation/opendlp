name: Docker Publish

on:
  push:
    paths:
      - "backend/**"
      - ".github/**"
      - ".grype.yaml"
    branches:
      - main

jobs:
  quality:
    uses: ./.github/workflows/main.yml
    permissions:
      contents: read
      pull-requests: write
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  bdd-tests:
    uses: ./.github/workflows/bdd.yml
    permissions:
      contents: read
      pull-requests: write

  docker-security:
    uses: ./.github/workflows/docker-security.yml
    with:
      skip_sarif_upload: true
    permissions:
      contents: read
      pull-requests: write
      security-events: write

  publish:
    needs: [quality, bdd-tests, docker-security]
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Create generated_version.txt
        run: git show --no-patch --format='%cd %h' --date=format:'%Y-%m-%d' HEAD > generated_version.txt
        working-directory: ./backend

      - name: Log in to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: hamishsortition/opendlp
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image published
        env:
          STEPS_META_OUTPUTS_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          echo "Docker image published successfully to hamishsortition/opendlp"
          echo "Tags: ${STEPS_META_OUTPUTS_TAGS}"
