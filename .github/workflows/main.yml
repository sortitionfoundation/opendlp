name: Main

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_call:
    secrets:
      CODECOV_TOKEN:
        required: false

jobs:
  quality:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Check out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/prek
          key: pre-commit-${{ hashFiles('.pre-commit-config-ci.yaml') }}

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env
        with:
          working-directory: ./backend

      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      - name: Run checks
        run: just check-ci

  tests-and-type-check:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    # Service containers to run with `container-job`
    services:
      # Label used to access the service container
      postgres:
        # Docker Hub image
        image: postgres:16
        # Provide the password for postgres
        env:
          POSTGRES_DB: opendlp
          POSTGRES_USER: opendlp
          POSTGRES_PASSWORD: abc123
        # Set health checks to wait until postgres has started
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 54322:5432
      redis:
        # Docker Hub image
        image: redis:alpine
        # Set health checks to wait until redis has started
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 63792:6379
    defaults:
      run:
        working-directory: ./backend
        shell: bash
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
      fail-fast: false
    steps:
      - name: Check out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ matrix.python-version }}
          working-directory: ./backend

      # without this, the health check tests might fail
      - name: Create generated_version.txt
        run: git show --no-patch --format='%cd %h' --date=format:'%Y-%m-%d' HEAD > generated_version.txt

      - name: Run tests
        env:
          DB_HOST: localhost
          DB_PORT: 54322
          DB_NAME: opendlp
        run: uv run python -m pytest tests --ignore tests/bdd --cov --cov-config=pyproject.toml --cov-report=xml --cov-fail-under=80

      - name: Check typing
        run: uv run mypy

      - name: Upload coverage reports to Codecov with GitHub Action on Python 3.12
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        if: ${{ matrix.python-version == '3.12' }}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
