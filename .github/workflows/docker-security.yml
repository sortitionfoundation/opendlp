name: Docker Security Scan

on:
  push:
    paths:
      - "backend/**"
      - ".github/**"
      - ".grype.yaml"
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_call:
    inputs:
      skip_sarif_upload:
        description: 'Skip uploading SARIF to GitHub Security tab (used when called from docker-publish.yml)'
        type: boolean
        required: false
        default: false

jobs:
  build-and-scan:
    permissions:
      contents: read
      pull-requests: write
      security-events: write
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Create generated_version.txt
        run: git show --no-patch --format='%cd %h' --date=format:'%Y-%m-%d' HEAD > generated_version.txt
        working-directory: ./backend

      - name: Build Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          load: true
          tags: opendlp-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Grype (table output for logs)
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7
        continue-on-error: true
        with:
          image: opendlp-backend:${{ github.sha }}
          fail-build: false
          only-fixed: false
          severity-cutoff: negligible
          output-format: table

      - name: Scan image with Grype (SARIF output for GitHub Security)
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7
        id: scan
        with:
          image: opendlp-backend:${{ github.sha }}
          fail-build: true
          only-fixed: true # only fail the build when a fix is available
          severity-cutoff: high

      - name: Upload Grype scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        if: always() && !inputs.skip_sarif_upload
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
