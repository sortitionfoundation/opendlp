repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: "v6.0.0"
    hooks:
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-json
      - id: check-symlinks
      - id: check-toml
      - id: check-yaml
        exclude: ^.devcontainer/devcontainer.json
      - id: detect-private-key
      - id: pretty-format-json
        exclude: ^.devcontainer/devcontainer.json
        args: [--autofix, --no-sort-keys]
      - id: end-of-file-fixer
      - id: trailing-whitespace

  # TODO: consider
  # - csslint
  # - javascript

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: "v0.15.5"
    hooks:
      - id: ruff-check
        args: [--exit-non-zero-on-fix, --fix, --config=backend/pyproject.toml]
      - id: ruff-format

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck

  - repo: https://github.com/rtts/djhtml
    rev: "3.0.10"
    hooks:
      - id: djhtml
      - id: djcss
      - id: djjs

  # check for secrets, ssh keys etc
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: package.lock.json,migrations/versions/.*\.py

  # look for typos
  - repo: https://github.com/crate-ci/typos
    rev: "v1.44.0"
    hooks:
      - id: typos
        # no `-w` disable the auto fix, always review the output
        # `-c` is to tell it where the config is
        # `--force-exclude` is because the pre-commit stuff explicitly passes every
        #    filename to typos as an argument. Without --force-exclude typos will
        #    check all the files, even though they are in the exclude.
        #    See https://github.com/crate-ci/typos/issues/347 for details.
        args: ["--force-exclude", "-c", "backend/pyproject.toml"]

  # Forbid .strftime() in Jinja templates - use flask-babel's
  # dateformat/datetimeformat/timeformat filters instead so month names,
  # date ordering and timezone handling respect the active locale.
  - repo: local
    hooks:
      - id: no-strftime-in-templates
        name: No .strftime() in Jinja templates (use babel filters)
        language: pygrep
        files: ^backend/templates/.*\.html$
        entry: '\.strftime\s*\('
