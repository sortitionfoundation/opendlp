<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>
            {% block title %}Backoffice{% endblock %}
            - OpenDLP</title>
        <!-- Tailwind CSS (compiled) -->
        <link rel="stylesheet"
              href="{{ url_for('static', filename='backoffice/dist/main.css', v=static_hashes('backoffice/dist/main.css') ) }}">
        <!-- Design Tokens -->
        <link rel="stylesheet"
              href="{{ url_for('static', filename='backoffice/tokens/primitive.css', v=static_hashes('backoffice/tokens/primitive.css') ) }}">
        <link rel="stylesheet"
              href="{{ url_for('static', filename='backoffice/tokens/semantic.css', v=static_hashes('backoffice/tokens/semantic.css') ) }}">
        <!-- Alpine.js components (must load before Alpine.js) -->
        <script nonce="{{ csp_nonce }}"
                src="{{ url_for('static', filename='backoffice/js/alpine-components.js', v=static_hashes('backoffice/js/alpine-components.js')) }}"></script>
        <!-- Scroll preservation utility (must load before Alpine.js) -->
        <script nonce="{{ csp_nonce }}"
                src="{{ url_for('static', filename='js/alpine-scroll-manager.js', v=static_hashes('js/alpine-scroll-manager.js')) }}"></script>
        <!-- Alpine.js (CSP-compatible build) -->
        <script nonce="{{ csp_nonce }}"
                defer
                src="https://cdn.jsdelivr.net/npm/@alpinejs/csp@3.15.8/dist/cdn.min.js"
                integrity="sha384-xnBLNTJyXCEHkKKVePh5Vzi1CyXuyWtN5HjqtWbBBchGrbCslU+ThoGQ/DcdOe9o"{# pragma: allowlist secret #}
                crossorigin="anonymous"></script>
        <!-- HTMX -->
        <script nonce="{{ csp_nonce }}"
                src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.7/dist/htmx.min.js"
                integrity="sha384-ZBXiYtYQ6hJ2Y0ZNoYuI+Nq5MqWBr+chMrS/RkXpNzQCApHEhOt2aY8EJgqwHLkJ"{# pragma: allowlist secret #}
                crossorigin="anonymous"></script>
        {% block head %}{% endblock %}
    </head>
    <body style="background-color: var(--color-bg-secondary)"
          class="min-h-screen">
        {% if site_banner_text %}
            <div class="site-banner"
                 style="background-color: {{ site_banner_colour }}">
                <div class="w-full p-2">
                    <p class="text-body-xl text-center font-semibold">{{ site_banner_text }}</p>
                </div>
            </div>
        {% endif %}
        {% block body %}
            <main class="max-w-screen-2xl mx-auto px-6 py-8">
                {% block content %}{% endblock %}
            </main>
        {% endblock %}
    </body>
</html>
