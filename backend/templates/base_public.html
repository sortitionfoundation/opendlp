<!DOCTYPE html>
<html lang="en" class="govuk-template">
    <head>
        <meta charset="utf-8">
        <title>
            {% block title %}{% endblock %}
        </title>
        <meta name="viewport"
              content="width=device-width, initial-scale=1, viewport-fit=cover">
        <meta name="theme-color" content="#0b0c0c">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <link rel="shortcut icon"
              sizes="16x16 32x32 48x48"
              href="/static/img/favicon.ico"
              type="image/x-icon">
        <link rel="stylesheet"
              href="{{ url_for('static', filename='css/application.css', v=static_hashes('css/application.css') ) }}">
        {% block extra_css %}{% endblock %}
        {% block extra_head %}{% endblock %}
    </head>
    <body class="govuk-template__body govuk-frontend-supported register-page">
        <script nonce="{{ csp_nonce }}">document.body.className = ((document.body.className) ? document.body.className + ' js-enabled' : 'js-enabled');</script>
        <a href="#main-content"
           class="govuk-skip-link"
           data-module="govuk-skip-link">{{ _("Skip to main content") }}</a>
        <div class="govuk-width-container">
            <main class="govuk-main-wrapper" id="main-content" role="main">
                {% block content %}{% endblock %}
            </main>
        </div>
        <footer class="govuk-footer" role="contentinfo">
            <div class="govuk-width-container">
                <div class="govuk-footer__meta">
                    <div class="govuk-footer__meta-item govuk-footer__meta-item--grow">
                        <h2 class="govuk-visually-hidden">{{ _("Support links") }}</h2>
                        <ul class="govuk-footer__inline-list">
                            <li class="govuk-footer__inline-list-item">
                                <a class="govuk-footer__link"
                                   href="{{ help_site_data_agreement }}"
                                   target="_blank">{{ _("User Data Agreement") }}</a>
                            </li>
                            <li class="govuk-footer__inline-list-item">
                                <a class="govuk-footer__link"
                                   href="{{ help_site_cookies }}"
                                   target="_blank">{{ _("Cookies") }}</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </footer>
        <script nonce="{{ csp_nonce }}"
                src="https://cdn.jsdelivr.net/npm/govuk-frontend@5.11.1/dist/govuk/all.bundle.min.js"
                integrity="sha384-gDZkBYDiXRQUvstxmxJ+TbB7CxTGzhmH+ZmBAGzbAEgYb/bglRLXcnh6ZxhaVYLy"{# pragma: allowlist secret #}
                crossorigin="anonymous"></script>
        <script nonce="{{ csp_nonce }}">
            document.addEventListener('DOMContentLoaded', function() {
                if (typeof window.GOVUKFrontend !== 'undefined') {
                    window.GOVUKFrontend.initAll();
                }
            });
        </script>
        {% block extra_js %}{% endblock %}
    </body>
</html>
